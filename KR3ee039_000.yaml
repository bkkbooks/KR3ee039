body:
  text: 內經營氣脈度運行考自敘余弱冠肄醫垂四十年矣所撰病家須知歌訣批點寒溫條辨業付手民其仲景傷寒輯注及仲景脈法外注都三十卷既無力付梓又不敢遽爾問世惟脈度運行考因宦海飄泊原稿遺失雖有古歌肺寅大卯胃辰宮脾巳心午小未中申膀酉腎戌包絡亥三子膽醜肝通行世人多宗之然究屬參差未敢沿誤蓋以人生經脈度數連陽蹺陰蹺附足太陽少陰合一丈五尺共一十六丈二尺手之三陰各長三尺五寸手之三陽各長五尺足之三陰各長六尺五寸足之三陽各長八尺督脈任脈各長四尺五寸長短既已懸殊安能以有定之十二時辰配長短各殊之十二經絡置督任於不論乎思欲再加釐定吏事又復羈身無暇及此因命內子按照內經營氣運行諸冊詳為核計將某經在某時某刻某分若干尺寸逐一標出毫不插以臆見庶經絡脈度兩相符合按時施治或不致誤又復附以歌訣簡語然亦不過自為閲歷非敢以之炫世其所以妄蓄棗梨者恐一失再失也閲者諒之時大清光緒二十四年歲在著雍閹茂孟春之吉彰五李盛卿敘於昆陽觀海軒內經脈度營氣運行各經時刻分數考手太陰肺經左右各長叄尺伍寸合柒尺右按橫排應為上下同經由中焦中府穴上腋循臂內廉過寸口出魚際抵大指內側少商穴自寅初初刻一分至正初刻七分行如數訖交手陽明經手陽明大腸經左右各長伍尺合一丈右經由食指內側商陽穴上腕循外肘側上膊貫頰入上齒左之右右之左抵鼻旁迎香穴自寅正初刻八分至寅末刻左右行五尺五寸二分又自卯初初刻一分至二刻十三分左右行四尺四寸八分訖交足陽明經足陽明胃經左右各長八尺合一丈陸尺右經由目下承泣穴繞面入下齒齦左之右右之左出下項循身前走足抵大指趾次指趾端歷兌穴自卯初二刻十四分至末刻左右行八尺又自辰初初刻一分至正一刻二分左右行八尺訖交足太陰經足太陰脾經左右各長陸尺伍寸合一丈叄尺右經由足大指趾隱白穴走足根跟循膕內廉走脾髀上腹抵胸旁大包穴自辰正一刻三分至末刻左右行四尺四寸七分二釐又自巳初初刻一分至正一刻七分左右行八尺五寸二分八釐訖交手少陰經手少陰心經左右各長叄尺伍寸合柒尺右經由胸中極泉穴上腋循臂內走腕抵手小指內少衝穴自巳正一刻八分至末刻左右行三尺九寸六分九釐又自午初初刻一分至一刻十四分左右行三尺零三分一釐訖交手太陽經手太陽小腸經左右各長伍尺合一丈右經由手小指外側少澤穴上腕循肘外上項抵耳前聽宮穴自午初一刻十五分至正三刻五分左右行如數訖交足太陽經足太陽膀胱經左右各長捌尺合一丈陸尺右經自目內眥睛明穴上頭下項循背走足抵小指趾外側至陰穴自午正三刻六分至末刻左右行二尺五寸八分四釐又未整時左右行一丈二尺四寸八分又自申初初刻一分至九分左右行九寸三分六釐訖交足少陰經足少陰腎經左右各長陸尺伍寸合一丈叄尺右經由足小指趾趨湧泉穴上足內踝繞足根跟出膕內廉上股循腹抵胸脅上俞府穴自申初初刻十分至末刻左右行一丈一尺五寸四分四釐又自酉初初刻一分至十四分左右行一尺四寸五分六釐訖交手厥陰經手厥陰心包經左右各長叄尺伍寸合柒尺右經由乳旁天池穴上腋循臂走腕抵手小指次指內中衝穴自酉初初刻十五分至酉正一刻六分左右行如數訖交手少陽經手少陽三焦經左右各長伍尺合一丈右經由手小指次指端關衝穴上腕循臂外走肩入耳後上耳角出耳前抵耳門穴自酉正一刻七分至末刻左右行四尺零六分二釐又自戌初初刻一分至戌初三刻十二分左右行五尺九寸三分八釐訖交足少陽經足少陽膽經左右各長捌尺合一丈陸尺右經由目內眥瞳子髎穴走耳上繞額下耳後還上前頂循後頂下項至肩走身側季脅行後股下膝踝抵足小指趾次指趾端竅陰穴自戌初三刻十三分至末刻左右行六尺五寸四分六釐又自亥初初刻一分至正二刻一分左右行九尺四寸五分四釐訖交足厥陰經足厥陰肝經左右各長陸尺伍寸合一丈叄尺右經由足大指趾本節後大敦穴走脛循膕內廉上膝行股內繞陰器上腹抵乳旁下期門穴自亥正二刻二分至末刻左右行三尺零一分六釐又自子初初刻一分至於正一刻六分左右行九尺九寸八分四釐訖交督脈以上十二經均系雙行以下督任二經單行督脈長肆尺伍寸右經由肝經別支接蓄門出鼻上頭循巔頂下項循火八目脊下入尾骶抵長強穴自子正一刻七分至末刻行一尺七寸零六釐又自醜初初刻一分至二刻三分行二尺七寸九分四釐訖交任脈任脈長肆尺伍寸右經由會陰穴循陰器上腹抵缺盆上入承漿穴下入肺自醜初二刻四分至末刻行如數復交手太陰經附營氣脈度運行六言歌第一太陰肺經每日寅時運行若問何時行盡寅正初刻七分第二大腸陽明接肺八分起行行至卯初二刻畢於一十三分第三陽明胃經接上一十四分自卯過辰至正一刻二分始清第四太陰脾土接上三分行走由辰行至巳正一刻七分細數第五手少陰心巳正一刻八分到午初初一刻一十四分交經第六太陽小腸接上末分起行只到午正三刻五分即交膀胱第七太陽膀胱足三陽經皆長午正三刻六分復與全未並行直至申初九分始交足小指趾旁第八足少陰腎申初十分須認酉初一十四分此經運行已盡第九厥陰心包酉初末分相遭至正一刻六分即到少陽三焦第十少陽三焦接上七分來交行至戌初三刻一十二分乃消十一足少陽膽長與胃膀無減接上一十三分戌亥行有長短亥正二刻一分交與肝經行轉十二足厥陰肝接上二分之間子正一刻六分十二經脈已全十三由肝過督惟此與任為獨接上一刻七分分明子與醜續二刻三分交任諸陽賴之以束十四渾衝於任接上四分運行醜末正值行竣絲毫不差交寅寅肺全大腸起卯大腸終胃起辰胃終脾起巳脾終心起午心終小腸全膀胱起未膀胱中申膀胱終腎起酉腎終包絡全三焦起戌三焦終膽起亥膽終肝起子肝終督起醜督終任全復交寅又簡捷語若問寅肺經已全大腸存若問卯大腸終時胃亦到若問辰胃終於此脾起行若問巳脾終心起皆在是若問午心終小全膀胱伍若問未只有膀胱中間位若問申膀胱將終腎即臨若問酉腎終包全三焦首若問戌三焦行終膽經及若問亥少陽膽終肝經在若問子厥陰肝終督脈始若問醜督終任全向寅走
